spring:
  application:
    name: hw3
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: MyHikariPool
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

logging:
  enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

info:
  name: homework-3
  version: 1.0.0